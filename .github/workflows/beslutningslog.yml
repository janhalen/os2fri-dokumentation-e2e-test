name: Beslutningslog
on:
  issues:
    types: [closed]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  beslutning:
    runs-on: ubuntu-latest
    steps:
      - name: Sikr at Beslutning-label findes i repoet
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/labels" \
            -d '{"name":"Beslutning","color":"0e8a16"}' || true

      - name: Tjek om issue har Beslutning-label
        id: check-label
        env:
          LABELS_JSON: ${{ toJSON(github.event.issue.labels) }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if echo "$LABELS_JSON" | grep -q '"Beslutning"'; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
            echo "Issue #${ISSUE_NUMBER} har ikke Beslutning-label — afslutter"
          fi

      - uses: actions/checkout@v4
        if: steps.check-label.outputs.has_label == 'true'

      - name: Generate decision log entry
        if: steps.check-label.outputs.has_label == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          ISSUE_CLOSED_AT: ${{ github.event.issue.closed_at }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          podman run --rm \
            -v "$(pwd):/repo:z" \
            --env ISSUE_NUMBER \
            --env ISSUE_TITLE \
            --env ISSUE_BODY \
            --env ISSUE_LABELS \
            --env ISSUE_CLOSED_AT \
            --env ISSUE_URL \
            -e OUTPUT_LOG="DECISION_LOG.md" \
            codeberg.org/os2-sandbox/automatiseret-beslutningslog:latest

      - name: Create pull request
        if: steps.check-label.outputs.has_label == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH="beslutning/${ISSUE_NUMBER}"
          git config user.name "beslutningslog"
          git config user.email "beslutningslog@os2fri.dk"
          git checkout -b "$BRANCH"
          git add DECISION_LOG.md
          git commit -m "BDR-${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          git push origin "$BRANCH"
          gh pr create \
            --title "BDR-${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Tilføjer beslutning #${ISSUE_NUMBER} til beslutningsloggen."
