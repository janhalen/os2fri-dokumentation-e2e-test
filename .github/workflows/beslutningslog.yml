name: Beslutningslog
on:
  issues:
    types: [closed]

jobs:
  beslutning:
    runs-on: ubuntu-latest
    steps:
      - name: Sikr at Beslutning-label findes i repoet
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/labels" \
            -d '{"name":"Beslutning","color":"0e8a16"}' || true

      - name: Tjek om issue har Beslutning-label
        id: check-label
        run: |
          LABELS='${{ toJSON(github.event.issue.labels) }}'
          if echo "$LABELS" | grep -q '"Beslutning"'; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
            echo "Issue #${{ github.event.issue.number }} har ikke Beslutning-label — afslutter"
          fi

      - uses: actions/checkout@v4
        if: steps.check-label.outputs.has_label == 'true'

      - name: Generate decision log entry
        if: steps.check-label.outputs.has_label == 'true'
        run: |
          podman run --rm \
            -v "$(pwd):/repo:z" \
            -e ISSUE_NUMBER="${{ github.event.issue.number }}" \
            -e ISSUE_TITLE="${{ github.event.issue.title }}" \
            -e ISSUE_BODY="${{ github.event.issue.body }}" \
            -e ISSUE_LABELS="${{ join(github.event.issue.labels.*.name, ', ') }}" \
            -e ISSUE_CLOSED_AT="${{ github.event.issue.closed_at }}" \
            -e ISSUE_URL="${{ github.event.issue.html_url }}" \
            -e OUTPUT_LOG="DECISION_LOG.md" \
            codeberg.org/os2-sandbox/automatiseret-beslutningslog:latest

      - name: Create pull request
        if: steps.check-label.outputs.has_label == 'true'
        run: |
          BRANCH="beslutning/${{ github.event.issue.number }}"
          git config user.name "beslutningslog"
          git config user.email "beslutningslog@os2fri.dk"
          git checkout -b "$BRANCH"
          git add DECISION_LOG.md
          git commit -m "BDR-#${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          git push origin "$BRANCH"
          curl -s -X POST "${{ github.api_url }}/repos/${{ github.repository }}/pulls" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "BDR-#${{ github.event.issue.number }}: ${{ github.event.issue.title }}",
              "head": "'"$BRANCH"'",
              "base": "'"${GITHUB_BASE_REF:-main}"'",
              "body": "Tilføjer beslutning #${{ github.event.issue.number }} til beslutningsloggen.",
              "labels": ["Beslutning"]
            }'
